<!DOCTYPE html>
<html>
<head>
    <title>Central de Transportes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Transportes</a>
    
    <div>
      <a class="btn btn-secondary" href="/admin/">Admin</a>
      {% if user.is_authenticated %}
        <a class="btn btn-light" href="/mis-boletos/">Mis boletos</a>
        <a class="btn btn-danger" href="/logout/">Salir</a>
      {% else %}
        <a class="btn btn-light" href="/login/">Login</a>
        <a class="btn btn-success" href="/registro/">Registro</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
